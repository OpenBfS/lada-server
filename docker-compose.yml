services:
  db:
    build:
      context: ./db_schema
    image: "koala/lada_db"
  server:
    build:
      context: ./
    image: "koala/lada_wildfly"
    depends_on:
      - db
    ports:
      - 8080 # direct access to interfaces
      - 9990 # Wildfly management console
      - 8787 # Remote debugging of server code
      - 5005 # Remote debugging of test code
  printer:
    image: "koala/lada_print_templates"
  client: # Assumes client checkout in ../client
    build:
      context: ../client
      target: development
    depends_on:
      server:
        condition: service_healthy
      printer:
        condition: service_started
        required: false
    ports:
      - 80-86
  lada-ldap:
    build:
      context: ./shibboleth
      dockerfile: ./ldap.Dockerfile
    image: "koala/lada_ldap"
  lada-idp:
    build:
      context: ./shibboleth
      dockerfile: ./shibboleth.Dockerfile
    depends_on:
      - lada-ldap
    ports:
      - 28443 # bind to host port 8443 for testing Shibboleth
